<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alto — Сборка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        #scanner-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; position: relative; margin-bottom: 20px; }
        #scanner-container video { width: 100%; object-fit: cover; border-radius: 12px; }
        #scanner-container canvas.drawingBuffer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .big-btn { font-size: 1.25rem; font-weight: 800; padding: 1.2rem; border-radius: 16px; width: 100%; text-transform: uppercase; color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.1s; }
        .big-btn:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 flex flex-col pt-8">

    <div class="max-w-md mx-auto w-full flex-1 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='/dashboard'" class="px-4 py-2 bg-gray-800 rounded-xl font-bold text-gray-400">← Назад</button>
            <h1 class="text-xl font-black text-blue-400">Сборка</h1>
            <div class="w-20"></div>
        </div>

        <div id="setup-panel" class="bg-gray-800 p-6 rounded-2xl mb-4 border border-gray-700">
            <h2 class="text-lg font-bold mb-4">Выбор поставки</h2>
            <select id="shipment-select" class="w-full bg-gray-900 px-4 py-3 rounded-xl mb-4 border border-gray-700 font-bold focus:border-blue-500 outline-none">
                <option value="">Загрузка...</option>
            </select>
            <button onclick="startAssembly()" class="big-btn bg-blue-600">ОК, ПРИСТУПАЮ</button>
        </div>

        <div id="scan-panel" style="display: none;" class="flex-1 flex flex-col">
            <div id="scanner-container"></div>
            
            <div class="text-center mb-4 text-gray-400 font-bold" id="last-barcode">Штрихкод: —</div>
            
            <div class="flex gap-2 mb-4">
                <div class="flex-1">
                    <label class="text-xs text-gray-400 font-bold ml-2">НОМЕР КОРОБА</label>
                    <input type="text" id="box-input" placeholder="Короб №" class="w-full mt-1 text-center text-2xl font-black bg-gray-800 rounded-xl border border-gray-700 py-3">
                </div>
                <div class="w-1/3">
                    <label class="text-xs text-gray-400 font-bold ml-2">КОЛ-ВО</label>
                    <input type="number" id="qty-input" value="1" class="w-full mt-1 text-center text-2xl font-black bg-gray-800 rounded-xl border border-gray-700 py-3">
                </div>
            </div>

            <button onclick="addToShipment()" class="big-btn bg-green-600 tracking-wide mt-auto">СОБРАТЬ</button>
        </div>
    </div>

    <!-- QuaggaJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        let currentShipmentId = null;
        let lastScannedCode = null;

        async function loadShipments() {
            try {
                const data = await apiAuthGet('/api/shipments/list');
                const sel = document.getElementById('shipment-select');
                sel.innerHTML = '<option value="">-- Выберите поставку --</option>';
                data.forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">[${s.id}] ${s.name} - ${s.status}</option>`;
                });
            } catch (e) {
                console.error(e);
            }
        }

        function startAssembly() {
            const sel = document.getElementById('shipment-select');
            if (!sel.value) return alert('Выберите поставку!');
            currentShipmentId = sel.value;
            
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('scan-panel').style.display = 'flex';
            
            initQuagga();
        }

        function initQuagga() {
            Quagga.init({
                inputStream : {
                    name : "Live",
                    type : "LiveStream",
                    target: document.querySelector('#scanner-container'),
                    constraints: { facingMode: "environment" }
                },
                decoder : {
                    readers : ["code_128_reader", "ean_reader", "ean_8_reader"]
                }
            }, function(err) {
                if (err) { console.error(err); return; }
                Quagga.start();
            });

            Quagga.onDetected(function(result) {
                const code = result.codeResult.code;
                if(code !== lastScannedCode) {
                    lastScannedCode = code;
                    document.getElementById('last-barcode').innerText = "Штрихкод: " + code;
                    document.getElementById('last-barcode').style.color = "#4ade80";
                    if(navigator.vibrate) navigator.vibrate(200);
                    
                    setTimeout(() => { document.getElementById('last-barcode').style.color = ""; }, 500);
                }
            });
        }

        async function addToShipment() {
            if (!lastScannedCode) return alert('Сначала отсканируйте штрихкод!');
            const qty = parseInt(document.getElementById('qty-input').value) || 1;
            const box = document.getElementById('box-input').value || "";
            
            try {
                await apiAuthPost(`/api/shipments/${currentShipmentId}/scan`, {
                    barcode: lastScannedCode, quantity: qty, box_number: box
                });
                alert('Собрано: ' + lastScannedCode + ' в ' + (box ? 'короб ' + box : 'свободный объем'));
                lastScannedCode = null;
                document.getElementById('last-barcode').innerText = "Штрихкод: —";
            } catch (e) {
                alert('Ошибка: ' + e);
            }
        }

        window.onload = loadShipments;
    </script>
</body>
</html>
