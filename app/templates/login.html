<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto — Вход</title>
    <meta name="description" content="Система фулфилмента Alto — авторизация">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
</head>
<body>
    <div class="login-container">
        <!-- Decorative background orbs -->
        <div style="position:fixed;top:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,0.06),transparent 70%);pointer-events:none"></div>
        <div style="position:fixed;bottom:-20%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(139,92,246,0.05),transparent 70%);pointer-events:none"></div>

        <div class="login-card">
            <div class="login-logo">Alto</div>
            <p class="login-subtitle">Система управления складом</p>

            <form id="login-form" autocomplete="off">
                <div style="margin-bottom:20px">
                    <label style="display:block;font-size:0.85rem;color:var(--text-muted);margin-bottom:6px;font-weight:500">Логин</label>
                    <input
                        type="text"
                        id="login-username"
                        required
                        autocomplete="username"
                        placeholder="Введите логин"
                        class="w-full px-4 py-3 rounded-xl border border-gray-700 bg-gray-800/50 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                    >
                </div>

                <div style="margin-bottom:24px">
                    <label style="display:block;font-size:0.85rem;color:var(--text-muted);margin-bottom:6px;font-weight:500">Пароль</label>
                    <input
                        type="password"
                        id="login-password"
                        required
                        autocomplete="current-password"
                        placeholder="Введите пароль"
                        class="w-full px-4 py-3 rounded-xl border border-gray-700 bg-gray-800/50 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                    >
                </div>

                <div id="login-error" style="display:none;margin-bottom:16px;padding:12px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-size:0.9rem;text-align:center"></div>

                <button
                    type="submit"
                    id="login-btn"
                    class="w-full py-3.5 rounded-xl font-bold text-white transition-all duration-200"
                    style="background:linear-gradient(135deg,#3b82f6,#6366f1);box-shadow:0 4px 20px rgba(59,130,246,0.3)"
                    onmouseover="this.style.boxShadow='0 6px 30px rgba(59,130,246,0.45)';this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.boxShadow='0 4px 20px rgba(59,130,246,0.3)';this.style.transform='translateY(0)'"
                >
                    Войти
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        // If already logged in, redirect
        if (API.getToken()) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
